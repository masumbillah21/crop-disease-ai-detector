services:

  # ─── FastAPI Backend ───────────────────────────────────────────
  backend:
    build: ./backend
    container_name: cropscan-backend
    volumes:
      - ./backend/model:/app/model:ro
      - model-cache:/root/.keras
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ─── React Frontend + Nginx Proxy ─────────────────────────────
  frontend:
    build: ./frontend
    container_name: cropscan-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  model-cache:
