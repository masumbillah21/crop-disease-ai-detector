# ─────────────────────────────────────────────────────────────
#  docker-compose.override.yml — DEV overrides
#  Automatically applied on top of docker-compose.yml
#  when running: docker compose up
#
#  For production use only base file:
#  docker compose -f docker-compose.yml up -d
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  backend:
    # Mount source code for live reload in dev
    volumes:
      - ./backend:/app
      - ./model:/app/model
      - model-cache:/root/.keras
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=2
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    # In dev: skip the nginx container, use Vite dev server instead
    build:
      context: ./frontend
      target: builder          # Only build the Node stage, skip nginx
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      - VITE_API_URL=http://localhost:8000
